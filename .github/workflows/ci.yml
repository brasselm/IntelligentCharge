name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:BuildNumber=${{ github.run_number }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish self-contained single-file (win-x64)
        run: |
          dotnet publish IntelligentChargeTray/IntelligentChargeTray.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:BuildNumber=${{ github.run_number }} -o publish/win-x64

      - name: Determine version
        run: |
          $xml = Get-Content Directory.Build.props -Raw
          if ($xml -match '<MajorMinorVersion[^>]*>([^<]+)</MajorMinorVersion>') { $mn = $matches[1].Trim() } else { Write-Error 'MajorMinorVersion not found in Directory.Build.props'; exit 1 }
          $v = "$mn.${{ github.run_number }}"
          Write-Output "Found version: $v"
          New-Item -ItemType Directory -Force -Path publish/win-x64 | Out-Null
          Set-Content -Path publish/win-x64/version.txt -Value $v -Encoding utf8

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-winx64
          path: publish/win-x64
