name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish self-contained single-file (win-x64)
        run: |
          dotnet publish IntelligentChargeTray/IntelligentChargeTray.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish/win-x64

      - name: Determine version (from Directory.Build.props)
        run: |
          $xml = Get-Content Directory.Build.props -Raw
          if ($xml -match '<Version[^>]*>([^<]+)</Version>') { $v = $matches[1].Trim() } else { Write-Error 'Version not found in Directory.Build.props'; exit 1 }
          Write-Output "Found version: $v"
          New-Item -ItemType Directory -Force -Path publish/win-x64 | Out-Null
          Set-Content -Path publish/win-x64/version.txt -Value $v -Encoding utf8

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-winx64
          path: publish/win-x64
